(1) OCP : Office chérifien des phosphates<br>
(2) FFEM : Le Fonds Français pour l'Environnement Mondial<br>

Très exactement le long de l'avenue Mohammed-V, entre la place Abd el-Moumen Ben Ali et la place du 16-Novembre, celle de la poste centrale. Au milieu, un centre commercial géant, le Carré Eden, des dizaines d'enseignes, Zara, Adidas, Etam, Celio sans oublier les géants de la téléphonie locale. La routine. Il y a une éternité, le site abritait un charmant marché aux fleurs, un euro la botte de roses, qui réconciliait tous les amoureux de passage. L'emplacement est désormais occupé par des immeubles avec balcons et terrasses, ce sont les mètres carrés les plus chers de Marrakech, 2000 à 3000 euros, parfois beaucoup plus. […] »*<br><br>

                <figcaption class="hidden-caption-content">Arrivées et départs des officiels aux abords de la « Blue Zone » ou zone bleue (celles des officiels et des accrédités) de la Cop 22 sous haute surveillance. Marrakech, Maroc - Novembre 2016.<br><br>

« Pendant 12 jours, plus de 20 000 personnes ont foulé le sol du village de la Cop 22 a Bab Ighli, au nord de Marrakech, à deux pas de l’aéroport. Quelques 300 000 m2 et 55 tentes constituent ce site monumentale entièrement construit selon le protocole onusien.<br><br>

Deux zones distinctes accueillaient les participants. La "BLUE ZONE" (Zone bleue), longue de prés de 1km, était entièrement administrée par l’ONU. C’est dans cette zone que se trouvaient les différents lieux de réunions et de négociations, les deux salles plénières, les pavillons des État participants, le centre des médias et une tente ou se regroupaient plusieurs dizaines d’ONG venues présenter leurs actions. Cette zone était strictement réservée aux personnes accréditées. <br>
La "GREEN ZONE" (Zone verte) était celle de la société civile et des entreprises. Deux énormes tentes abritaient d’un coté, les stands des universités, des ONG et des institutions marocaines et internationales, de l’autre, les espaces innovations avec des entreprises marocaines et étrangères venues exposer leurs technologies et concepts innovants. »*<br><br>

*https://www.globe-reporters.org/campagnes/2016-2017-cop-22-a-marrakech/coulisses-de-la-cop-22/article/les-dessous-de-la-cop-en-photos   (consulté le 20 septembre 2020)</figcaption>

Dans une interview qu’elle a donnée à Marrakech nous avons lu qu’elle avait lancé lors de cette Cop une « plate-forme » sur des « stratégies de long terme, avec le noyau des premiers volontaires. Une vingtaine de pays, dont la Colombie, la France, l’Allemagne ou encore le Brésil vont y participer. L’idée est de parvenir à définir, avant 2018, ces stratégies visant à réduire drastiquement les émissions de gaz à effet de serre nationales. Les contributions mises sur la table pour l’accord de Paris sont assez conservatrices. Là, il s’agit d’afficher à quel point chacun en sera vraiment en 2050. […] J’ai en effet poussé l’idée que la plate-forme intègre des villes, des régions ou des entreprises engagées volontairement dans cette voie. Des États américains, comme l’État de Washington et la Californie, mais aussi la Catalogne, une région du Nigeria et deux régions australiennes vont rejoindre cette plate-forme.<br>
La participation d’entreprises est intéressante car les gouvernements pourront étudier leurs hypothèses sur l’évolution de la nature et des coûts des technologies. Trop souvent, les gouvernements raisonnent sur les technologies du passé, pas à partir de celles de demain.<br>
Les villes sont aussi des acteurs majeurs dans la lutte contre le changement climatique. Par exemple, les villes chinoises ont annoncé une réduction de leurs émissions de gaz à effet de serre en avance sur l’objectif avancé affiché par les autorités nationales. »*<br><br>

Accord de Paris :<br>
« Lors de la COP21 à Paris, le 12 décembre 2015, les Parties à la CCNUCC sont parvenues à un accord historique pour lutter contre le changement climatique et pour accélérer et intensifier les actions et les investissements nécessaires à un avenir durable à faible intensité de carbone. L'Accord de Paris s'appuie sur la Convention et - pour la première fois - rassemble toutes les nations autour d'une cause commune pour entreprendre des efforts ambitieux afin de combattre le changement climatique et de s'adapter à ses conséquences, avec un soutien accru pour aider les pays en développement à le faire. En tant que tel, il trace une nouvelle voie dans l'effort mondial en matière de climat.<br>
L'objectif central de l'Accord de Paris est de renforcer la réponse mondiale à la menace du changement climatique en maintenant l'augmentation de la température mondiale à un niveau bien inférieur à 2 degrés Celsius par rapport aux niveaux préindustriels et de poursuivre les efforts pour limiter encore davantage l'augmentation de la température à 1,5 degré Celsius. […] »*<br><br>

“J’étais enchantée de voir comment cette initiative a apporté une amélioration de la vie de la communauté, spécialement les filles et les garçons de l’internat. Il ne s’agit pas uniquement de l’efficacité énergétique, mais de l’impact immédiat sur la façon dont les étudiants étudient, interagissent et voient leur environnement ». Déclare Fatoumata Ndiaye, UNICEF Deputy Executive Director.<br>
