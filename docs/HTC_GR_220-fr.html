« […] Le photographe Francesco Zizola a effectué un photoreportage au mois de juillet dernier pour illustrer des projets en rapport avec le climat que le Maroc met en œuvre avec le soutien de l’AFD. Son reportage fera l’objet d’une exposition en plein air, du 7 au 18 novembre, sur les grilles du parc Lalla Hasna. Les projets présentés sont la centrale solaire Noor Ouarzazate, le tramway de Rabat-Salé, la stratégie eau d’OCP (1) et les hammams durables financés par le FFEM (2) […]. »*<br><br>

(1) OCP : Office chérifien des phosphates<br>
(2) FFEM : Le Fonds Français pour l'Environnement Mondial<br>

(1) « […] On appelle ainsi le quartier moderne de Marrakech, celui qui, jadis dessiné par les Français, a poussé tout en lignes droites, immeubles, larges avenues et carrefours avec feux tricolores (respectés, sauf par les Mobylette). Le tout, dans une harmonie d'ocres assez réussie. Pour les délices du méli-mélo oriental, le fameux souk, qu'inventèrent les lignées de marchands, passez votre chemin. En revanche, amateurs de jeans déchirés aux genoux, de boutiques dernier cri, de musique lounge et de tables à la mode, c'est ici que ça se passe.<br><br>

Très exactement le long de l'avenue Mohammed-V, entre la place Abd el-Moumen Ben Ali et la place du 16-Novembre, celle de la poste centrale. Au milieu, un centre commercial géant, le Carré Eden, des dizaines d'enseignes, Zara, Adidas, Etam, Celio sans oublier les géants de la téléphonie locale. La routine. Il y a une éternité, le site abritait un charmant marché aux fleurs, un euro la botte de roses, qui réconciliait tous les amoureux de passage. L'emplacement est désormais occupé par des immeubles avec balcons et terrasses, ce sont les mètres carrés les plus chers de Marrakech, 2000 à 3000 euros, parfois beaucoup plus. […] »*<br><br>

Ici des images du complexe solaire Noor Ouarzazate :<br>
« Le complexe Noor Ouarzazate (arabe : محطة نور للطاقة الشمسية), est le premier projet solaire élaboré dans le cadre de la stratégie énergétique marocaine qui vise à porter la part des EnR (1) dans le mix électrique national à plus de 52 % à l'horizon 2030.<br>
La première phase du complexe, Noor Ouarzazate I, a été inaugurée par le Roi Mohammed VI en 2016. »**<br><br>

(1) EnR : Énergiere nouvelable<br>

                <figcaption class="hidden-caption-content">Laurence Tubiana, « ambassadrice chargée des négociations sur le changement climatique pour la France et «championne du climat» des Nations unies »* et Driss el Yazami membre du comité de pilotage, chef du pôle de la société civile, de la 22e session de la Conférence des Parties de la Convention-Cadre des Nations unies sur les Changements Climatiques (COP22), dans l’espace dédié à la société civile et aux entreprises (zone verte ou green zone) de la COP22. Marrakech, Maroc - Novembre 2016.<br><br>

Dans une interview qu’elle a donnée à Marrakech nous avons lu qu’elle avait lancé lors de cette Cop une « plate-forme » sur des « stratégies de long terme, avec le noyau des premiers volontaires. Une vingtaine de pays, dont la Colombie, la France, l’Allemagne ou encore le Brésil vont y participer. L’idée est de parvenir à définir, avant 2018, ces stratégies visant à réduire drastiquement les émissions de gaz à effet de serre nationales. Les contributions mises sur la table pour l’accord de Paris sont assez conservatrices. Là, il s’agit d’afficher à quel point chacun en sera vraiment en 2050. […] J’ai en effet poussé l’idée que la plate-forme intègre des villes, des régions ou des entreprises engagées volontairement dans cette voie. Des États américains, comme l’État de Washington et la Californie, mais aussi la Catalogne, une région du Nigeria et deux régions australiennes vont rejoindre cette plate-forme.<br>
La participation d’entreprises est intéressante car les gouvernements pourront étudier leurs hypothèses sur l’évolution de la nature et des coûts des technologies. Trop souvent, les gouvernements raisonnent sur les technologies du passé, pas à partir de celles de demain.<br>
Les villes sont aussi des acteurs majeurs dans la lutte contre le changement climatique. Par exemple, les villes chinoises ont annoncé une réduction de leurs émissions de gaz à effet de serre en avance sur l’objectif avancé affiché par les autorités nationales. »*<br><br>

*https://www.la-croix.com/Sciences/Environnement/COP22-pour-Laurence-Tubiana-gouvernements-peuvent-arriver-tout-seuls-2016-11-17-1200803763   (consulté le 20 septembre 2020)<br>
**https://fr.wikipedia.org/wiki/Driss_el-Yazami</figcaption>
