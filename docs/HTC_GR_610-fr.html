const leftArrowSVGString = '<svg aria-hidden="true" class="pswp__ich" viewBox="0 0 20 20" width="20" height="20"><path d="M18.271,9.212H3.615l4.184-4.184c0.306-0.306,0.306-0.801,0-1.107c-0.306-0.306-0.801-0.306-1.107,0L1.21,9.403C1.194,9.417,1.174,9.421,1.158,9.437c-0.181,0.181-0.242,0.425-0.209,0.66c0.005,0.038,0.012,0.071,0.022,0.109c0.028,0.098,0.075,0.188,0.142,0.271c0.021,0.026,0.021,0.061,0.045,0.085c0.015,0.016,0.034,0.02,0.05,0.033l5.484,5.483c0.306,0.307,0.801,0.307,1.107,0c0.306-0.305,0.306-0.801,0-1.105l-4.184-4.185h14.656c0.436,0,0.788-0.353,0.788-0.788S18.707,9.212,18.271,9.212z"></path></svg>';
const rightArrowSVGString ='<svg aria-hidden="true" class="pswp__ich" viewBox="0 0 20 20" width="20" height="20"><path d="M1.729,9.212h14.656l-4.184-4.184c-0.307-0.306-0.307-0.801,0-1.107c0.305-0.306,0.801-0.306,1.106,0l5.481,5.482c0.018,0.014,0.037,0.019,0.053,0.034c0.181,0.181,0.242,0.425,0.209,0.66c-0.004,0.038-0.012,0.071-0.021,0.109c-0.028,0.098-0.075,0.188-0.143,0.271c-0.021,0.026-0.021,0.061-0.045,0.085c-0.015,0.016-0.034,0.02-0.051,0.033l-5.483,5.483c-0.306,0.307-0.802,0.307-1.106,0c-0.307-0.305-0.307-0.801,0-1.105l4.184-4.185H1.729c-0.436,0-0.788-0.353-0.788-0.788S1.293,9.212,1.729,9.212z"></path></svg>';
const zoomSVGString = '';

function jumpToTopPromise () {
  window.scrollTo(0,0);
}

const options = {
  gallery: '#gallery--with-custom-caption',
  children: '.pswp-gallery__item',
  showHideAnimationType: 'none',
  zoomAnimationDuration: false,
  zoom: false,
  arrowPrevSVG: leftArrowSVGString,
  arrowNextSVG: rightArrowSVGString,
  bgOpacity: 1,

  // Jump to top of page so clicked images near the bottom are in the viewport
  openPromise: jumpToTopPromise,

  // Hide PS caption by mouse clicking image
  imageClickAction: (releasePoint, e) => {
  const caption = document.querySelector('.pswp__custom-caption');
  const style = getComputedStyle(caption);
  const vis = style.display;
  if (vis == 'block') {caption.style.display = 'none';}
  else if (vis == 'none') {caption.style.display = 'block';}
  },

  // Hide PS caption by tapping on viewport
  tapAction: (releasePoint, e) => {
  const caption = document.querySelector('.pswp__custom-caption');
  const style = getComputedStyle(caption);
  const vis = style.display;
  if (vis == 'block') {caption.style.display = 'none';}
  else if (vis == 'none') {caption.style.display = 'block';}
  },

  pswpModule: () => import('/ps5/photoswipe.esm.min.js')
};

const lightbox = new PhotoSwipeLightbox(options);
lightbox.on('uiRegister', function() {

  lightbox.pswp.ui.registerElement({
    name: 'custom-caption',
    isButton: false,
    appendTo: 'root',
    html: '',
    onInit: (el, pswp) => {
      lightbox.pswp.on('change', () => {
        const currSlideElement = lightbox.pswp.currSlide.data.element;
        let captionHTML = '';
        if (currSlideElement) {
          const hiddenCaption = currSlideElement.querySelector('.hidden-caption-content');
          if (hiddenCaption) {
            // get caption from element with class hidden-caption-content
            captionHTML = hiddenCaption.innerHTML;
          }
        }
        el.innerHTML = captionHTML || '';
      });
    }
  });

  // display a pseudo button with message to toggle caption
  lightbox.pswp.ui.registerElement({
    name: 'hide-cap-button',
    order: 10,
    isButton: true,
    html: "(cliquer sur l&apos;image pour lire ou ne pas lire la légende)"
  });
});

lightbox.init();
</script>
